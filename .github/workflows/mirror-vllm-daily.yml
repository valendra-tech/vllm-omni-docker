name: Mirror latest vLLM-Omni image

on:
  schedule:
    - cron: 17 3 * * *
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  find-latest-version:
    name: Find latest release
    runs-on: ubuntu-latest
    outputs:
      vllm_omni_ref: ${{ steps.latest.outputs.vllm_omni_ref }}
    steps:
      - name: Find latest release tag
        id: latest
        shell: bash
        run: |
          set -euo pipefail

          tags_file="$(mktemp)"
          trap 'rm -f "$tags_file"' EXIT
          next_url="https://hub.docker.com/v2/repositories/vllm/vllm-omni/tags?page_size=100&ordering=last_updated"

          while [[ -n "$next_url" ]]; do
            page="$(curl --fail --silent --show-error --location "$next_url")"
            jq -r '.results[]?.name' <<< "$page" >> "$tags_file"
            next_url="$(jq -r '.next // empty' <<< "$page")"
          done

          latest_version="$(
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' "$tags_file" \
              | sort -t. -k1,1n -k2,2n -k3,3n -u \
              | tail -n 1
          )"

          if [[ -z "$latest_version" ]]; then
            echo "No vLLM-Omni release was found on Docker Hub" >&2
            exit 1
          fi

          echo "Latest vLLM-Omni version: ${latest_version}"
          echo "vllm_omni_ref=${latest_version}" >> "$GITHUB_OUTPUT"

  mirror:
    name: Mirror latest version
    needs: find-latest-version
    uses: ./.github/workflows/mirror-vllm-reusable.yml
    with:
      vllm_omni_ref: ${{ needs.find-latest-version.outputs.vllm_omni_ref }}
