name: Mirror vLLM-Omni image

on:
  workflow_call:
    inputs:
      vllm_omni_ref:
        description: vLLM-Omni release tag (0.24.0, v0.24.0) or custom tag (cosmos3, latest)
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  SOURCE_IMAGE: docker.io/vllm/vllm-omni

jobs:
  validate_ref:
    name: Validate reference
    runs-on: ubuntu-latest
    outputs:
      source_tag: ${{ steps.ref.outputs.source_tag }}
    steps:
      - name: Normalize reference
        id: ref
        env:
          INPUT_REF: ${{ inputs.vllm_omni_ref }}
        shell: bash
        run: |
          set -euo pipefail

          reference="${INPUT_REF}"

          if [[ "$reference" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            source_tag="${reference/#v/v}"
          elif [[ "$reference" =~ ^[0-9a-z_.-]+$ ]]; then
            source_tag="${reference}"
          else
            echo "vllm_omni_ref must be a version (X.Y.Z, vX.Y.Z) or a tag name (cosmos3, latest)" >&2
            exit 1
          fi

          echo "source_tag=${source_tag}" >> "$GITHUB_OUTPUT"

  mirror:
    name: Mirror ${{ needs.validate_ref.outputs.source_tag }}
    needs: validate_ref
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes skopeo

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | skopeo login ghcr.io \
            --username "$GHCR_USER" \
            --password-stdin

      - name: Mirror image
        env:
          SOURCE_TAG: ${{ needs.validate_ref.outputs.source_tag }}
        shell: bash
        run: |
          set -euo pipefail

          source_tag="${SOURCE_TAG}"
          source_image="${SOURCE_IMAGE}:${source_tag}"
          target_image="ghcr.io/${GITHUB_REPOSITORY,,}:${source_tag}"

          echo "Copying ${source_image} to ${target_image}"
          skopeo copy --all --retry-times 3 \
            "docker://${source_image}" \
            "docker://${target_image}"
