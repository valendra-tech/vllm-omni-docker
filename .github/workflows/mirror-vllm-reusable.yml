name: Mirror vLLM image

on:
  workflow_call:
    inputs:
      vllm_ref:
        description: vLLM release or full nightly commit SHA
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  SOURCE_IMAGE: docker.io/vllm/vllm-openai

jobs:
  validate_ref:
    name: Validate vLLM reference
    runs-on: ubuntu-latest
    outputs:
      vllm_ref: ${{ steps.ref.outputs.vllm_ref }}
      ref_type: ${{ steps.ref.outputs.ref_type }}
    steps:
      - name: Normalize reference
        id: ref
        env:
          INPUT_REF: ${{ inputs.vllm_ref }}
        shell: bash
        run: |
          set -euo pipefail

          reference="${INPUT_REF#v}"
          if [[ "$reference" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            ref_type="release"
          elif [[ "$reference" =~ ^[0-9a-f]{40}$ ]]; then
            ref_type="nightly"
          else
            echo "vllm_ref must match X.Y.Z, vX.Y.Z, or a 40-character lowercase commit SHA" >&2
            exit 1
          fi

          echo "vllm_ref=$reference" >> "$GITHUB_OUTPUT"
          echo "ref_type=$ref_type" >> "$GITHUB_OUTPUT"

  mirror:
    name: Mirror ${{ matrix.cuda }} ${{ needs.validate_ref.outputs.ref_type }}
    needs: validate_ref
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: cu129
            release_tag_suffix: -cu129-ubuntu2404
            nightly_tag_prefix: cu129-nightly-
          - cuda: cu13
            release_tag_suffix: -ubuntu2404
            nightly_tag_prefix: nightly-
    steps:
      - name: Install Skopeo
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes skopeo

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | skopeo login ghcr.io \
            --username "$GHCR_USER" \
            --password-stdin

      - name: Mirror image
        env:
          VLLM_REF: ${{ needs.validate_ref.outputs.vllm_ref }}
          REF_TYPE: ${{ needs.validate_ref.outputs.ref_type }}
          RELEASE_TAG_SUFFIX: ${{ matrix.release_tag_suffix }}
          NIGHTLY_TAG_PREFIX: ${{ matrix.nightly_tag_prefix }}
        shell: bash
        run: |
          set -euo pipefail

          case "$REF_TYPE" in
            release)
              source_tag="v${VLLM_REF}${RELEASE_TAG_SUFFIX}"
              ;;
            nightly)
              source_tag="${NIGHTLY_TAG_PREFIX}${VLLM_REF}"
              ;;
            *)
              echo "Unsupported vLLM reference type: ${REF_TYPE}" >&2
              exit 1
              ;;
          esac

          source_image="${SOURCE_IMAGE}:${source_tag}"
          target_image="ghcr.io/${GITHUB_REPOSITORY,,}:${source_tag}"

          echo "Copying ${source_image} to ${target_image}"
          skopeo copy --all --retry-times 3 \
            "docker://${source_image}" \
            "docker://${target_image}"