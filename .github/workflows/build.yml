name: Build vLLM-Omni multi-CUDA

on:
  workflow_dispatch:
    inputs:
      vllm_omni_version:
        description: vLLM-Omni git tag or branch (v0.24.0, main)
        required: true
        type: string
        default: v0.24.0
      vllm_base_version:
        description: Matching vLLM base version for the source image (0.24.0 or v0.24.0)
        required: true
        type: string
        default: 0.24.0
      platforms:
        description: Target platforms (comma-separated)
        required: false
        type: string
        default: linux/amd64

permissions:
  contents: read
  packages: write

env:
  VLLM_OPENAI_IMAGE: docker.io/vllm/vllm-openai

jobs:
  build:
    name: Build ${{ matrix.cuda }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: cu129
            tag_suffix: -cu129
            base_tag_suffix: -cu129-ubuntu2404
          - cuda: cu13
            tag_suffix: -cu13
            base_tag_suffix: -ubuntu2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Normalize versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          omni_version="${{ inputs.vllm_omni_version }}"
          base_version="${{ inputs.vllm_base_version }}"
          base_version="${base_version#v}"

          echo "omni_version=${omni_version}" >> "$GITHUB_OUTPUT"
          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          build-args: |
            VLLM_OMNI_VERSION=${{ steps.versions.outputs.omni_version }}
            BASE_IMAGE=${{ env.VLLM_OPENAI_IMAGE }}:v${{ steps.versions.outputs.base_version }}${{ matrix.base_tag_suffix }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.omni_version }}${{ matrix.tag_suffix }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
