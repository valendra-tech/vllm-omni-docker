name: Mirror vLLM reference

on:
  workflow_dispatch:
    inputs:
      vllm_ref:
        description: vLLM release (0.23.0 or v0.23.0) or full nightly commit SHA
        required: true
        type: string
        default: 0.23.0

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror requested reference
    uses: ./.github/workflows/mirror-vllm-reusable.yml
    with:
      vllm_ref: ${{ inputs.vllm_ref }}