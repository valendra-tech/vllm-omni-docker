name: Mirror vLLM-Omni reference

on:
  workflow_dispatch:
    inputs:
      vllm_omni_ref:
        description: vLLM-Omni release (0.24.0, v0.24.0) or tag (cosmos3, latest)
        required: true
        type: string
        default: v0.24.0

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror requested reference
    uses: ./.github/workflows/mirror-vllm-reusable.yml
    with:
      vllm_omni_ref: ${{ inputs.vllm_omni_ref }}
