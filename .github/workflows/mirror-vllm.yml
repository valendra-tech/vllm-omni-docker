name: Mirror vLLM version

on:
  workflow_dispatch:
    inputs:
      vllm_version:
        description: vLLM version to mirror, for example 0.23.0
        required: true
        type: string
        default: 0.23.0

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror requested version
    uses: ./.github/workflows/mirror-vllm-reusable.yml
    with:
      vllm_version: ${{ inputs.vllm_version }}